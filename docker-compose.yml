# Production compose for the VPS.
#
# The VPS NEVER BUILDS. Its disk writes at ~15 MB/s, so compiling there
# starved the whole box (BuildKit crashed mid-build; the live bot lagged).
# GitHub Actions builds and pushes the images (.github/workflows/build.yml)
# and the VPS only pulls them — a sequential read, which this disk handles:
#
#   docker compose pull && docker compose up -d
#
# Pin or roll back with HQ_TAG=<git-sha> in .env (default: latest).
# To build an image by hand on a FAST machine (not the VPS):
#   docker build --target runner -t ghcr.io/yazanalkamal/hq-app:latest .
#
# NOTE: docker-compose.override.yml is LOCAL DEV ONLY (publishes the DB port)
# and is git-ignored — it must never reach the VPS. (Same rule as streambot.)

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hq}
      POSTGRES_DB: ${POSTGRES_DB:-hq}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hq} -d ${POSTGRES_DB:-hq}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ghcr.io/yazanalkamal/hq-app:${HQ_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hq}:${POSTGRES_PASSWORD:-hq}@postgres:5432/${POSTGRES_DB:-hq}
      APP_URL: ${APP_URL:-https://hq.al-kamal.net}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      ALLOWED_EMAIL: ${ALLOWED_EMAIL}
      STATS_INGEST_SECRET: ${STATS_INGEST_SECRET}
    ports:
      - "127.0.0.1:3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default: {}
      # shared with streambot's caddy container, which owns 80/443 on the
      # VPS and serves the hq.al-kamal.net vhost → hq-app:3000
      edge:
        aliases: [hq-app]

  # One-off migration runner:  docker compose run --rm migrate
  migrate:
    image: ghcr.io/yazanalkamal/hq-migrate:${HQ_TAG:-latest}
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hq}:${POSTGRES_PASSWORD:-hq}@postgres:5432/${POSTGRES_DB:-hq}
    depends_on:
      postgres:
        condition: service_healthy

  # X (@POGYaz) stats scraper — نبض المنصات. The logged-in session lives in
  # the xsnap-state volume; seed it once via xsnap/login.mjs (see its header).
  xsnap:
    image: ghcr.io/yazanalkamal/hq-xsnap:${HQ_TAG:-latest}
    restart: unless-stopped
    environment:
      HQ_STATS_URL: http://app:3000
      STATS_INGEST_SECRET: ${STATS_INGEST_SECRET}
      X_HANDLE: ${X_HANDLE:-POGYaz}
    volumes:
      - xsnap-state:/data
    depends_on:
      - app

volumes:
  pgdata:
  xsnap-state:

networks:
  default: {}
  # created once per machine: docker network create edge
  edge:
    external: true
