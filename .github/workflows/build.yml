on:
  push:
    branches: [main]
  workflow_dispatch: {}

name: build images

# The VPS disk writes at ~15 MB/s, so compiling there starved the whole box
# (BuildKit crashed, the live bot lagged). Images are built HERE and the VPS
# only pulls them — a sequential read, the one thing that disk does fine.
permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            context: .
            file: ./Dockerfile
            target: runner
          - name: migrate
            context: .
            file: ./Dockerfile
            target: migrate
          - name: xsnap
            context: ./xsnap
            file: ./xsnap/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr paths must be lowercase; the owner is "yazanalkamal" but don't
      # assume — derive it so a rename/fork doesn't silently break the push.
      - id: repo
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/hq-${{ matrix.name }}:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/hq-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
